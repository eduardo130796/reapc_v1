version: "3.9"

services:

  backend:
    build: ./backend
    container_name: repactuacao_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app   # 🔥 HOT RELOAD
    env_file:
      - ./backend/.env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: always

  frontend:
    build: ./frontend
    container_name: repactuacao_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host
    depends_on:
      - backend
    restart: always

volumes:
  node_modules: